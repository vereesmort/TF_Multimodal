# Ablation: CUR monopharmacy encoding
# Compare interpretable decomposition vs TF-IDF baseline

raw_dir: "data/raw"
cache_dir: "data/cache"
output_dir: "outputs/ablation_cur"

interaction: "SimplE"
embedding_dim: 256

mono_method: "cur"
mono_components: 128
chemberta_model: "seyonec/ChemBERTa-zinc-base-v1"

esm2_model: "facebook/esm2_t6_8M_UR50D"
n_hops: 1

n_epochs: 200
lr: 0.001
batch_size: 512
device: "cpu"

n_negative_samples_eval: 100
